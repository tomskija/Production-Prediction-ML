version: "3.8"

services:

  calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production-prediction-local-devcontainer
    volumes:
      - .:/workspace
      - mlruns:/workspace/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=production_prediction
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      - AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP:-}
      - AZURE_ML_WORKSPACE=${AZURE_ML_WORKSPACE:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - ml-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production-prediction-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/workspace
      - mlruns:/workspace/mlruns
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=production_prediction
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      - AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP:-}
      - AZURE_ML_WORKSPACE=${AZURE_ML_WORKSPACE:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ml-network

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ml-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres-server
    environment:
      - POSTGRES_DB=production_prediction
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d production_prediction"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ml-network

volumes:
  mlruns:
  pgdata:

networks:
  ml-network:
    driver: bridge