version: "3.8"

services:

  calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rf-production-prediction
    volumes:
      - .:/workspace
      - mlruns:/workspace/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"
    networks:
      - ml-network

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ml-network

volumes:
  mlruns:

networks:
  ml-network:
    driver: bridge