name: CI

on:
  push:
    branches: [release/dev]
  pull_request:
    branches: [release/dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for MLflow..."
          for i in $(seq 1 30); do
            docker compose exec -T calculator python -c "import urllib.request; urllib.request.urlopen('http://mlflow:5000')" && break
            sleep 5
          done

      - name: Download dataset
        run: |
          curl -L "https://raw.githubusercontent.com/GeostatsGuy/GeoDataSets/master/unconv_MV.csv" \
          -o productionPredictionCalculator/Data/Unconventional_Synthetic_Dataset.csv

      - name: Copy dataset into container
        run: |
          docker compose cp productionPredictionCalculator/Data/Unconventional_Synthetic_Dataset.csv calculator:/workspace/productionPredictionCalculator/Data/Unconventional_Synthetic_Dataset.csv

      - name: Run pytest
        run: |
          docker compose exec -T calculator pytest tests/test_calculator.py -v

      - name: Stop services
        if: always()
        run: docker compose down